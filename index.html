<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ArenaComp - A plataforma definitiva para atletas e organizadores de Jiu-Jitsu." />
    <title>ArenaComp - Jiu-Jitsu Platform</title>
    
    <!-- Default Open Graph tags for root domain -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ArenaComp - Jiu-Jitsu Platform" />
    <meta property="og:description" content="A plataforma definitiva para atletas e organizadores de Jiu-Jitsu. Compartilhe suas conquistas, acompanhe rankings e muito mais." />
    <meta property="og:image" content="https://www.arenacomp.com.br/api/og-image/logo/default?v=19" />
    <meta property="og:site_name" content="ArenaComp" />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArenaComp - Jiu-Jitsu Platform" />
    <meta name="twitter:description" content="A plataforma definitiva para atletas e organizadores de Jiu-Jitsu." />
    <meta name="twitter:image" content="https://www.arenacomp.com.br/api/og-image/logo/default?v=19" />
    <script>
      // Suppress Vite WebSocket connection errors in the console
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
            return;
          }
          originalError.apply(console, args);
        };
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && event.reason.message && event.reason.message.includes('WebSocket closed without opened')) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
